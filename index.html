/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F4F6F8;color:#1A1A1A;font-size:14px;}
/* ── Config Banner ── */
#cfg-banner{background:#FFF3CD;border-bottom:1px solid #FFD700;padding:10px 20px;font-size:13px;display:flex;align-items:center;gap:10px;}
#cfg-banner input{flex:1;max-width:560px;padding:5px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;}
#cfg-banner button{padding:5px 14px;background:#0F6E56;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;}
/* ── Header ── */
.hdr{background:#0F6E56;color:#fff;padding:11px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr h1{font-size:15px;font-weight:500;}
.hdr-r{display:flex;gap:8px;align-items:center;}
.ubadge{font-size:11px;background:rgba(255,255,255,0.15);padding:3px 12px;border-radius:20px;}
.btn-logout{font-size:12px;background:rgba(255,255,255,0.1);padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,0.25);}
.btn-logout:hover{background:rgba(255,255,255,0.25);}

.login-bg-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.25);}
.login-right{width:420px;flex-shrink:0;background:#fff;display:flex;align-items:center;justify-content:center;padding:32px 28px;box-shadow:-4px 0 24px rgba(0,0,0,0.12);}
.lcard{background:transparent;border:none;border-radius:0;padding:0;width:100%;box-shadow:none;}
.llogo{text-align:center;margin-bottom:22px;}
.llogo-icon{width:52px;height:52px;background:#E1F5EE;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.llogo h2{font-size:17px;font-weight:600;color:#0F6E56;}
.llogo p{font-size:12px;color:#666;margin-top:3px;}
.qroles{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.qrole{padding:8px;font-size:12px;border:1px solid #DDD;border-radius:8px;background:#F9F9F9;cursor:pointer;text-align:center;color:#555;transition:all .15s;}
.qrole:hover,.qrole.on{border-color:#0F6E56;background:#E1F5EE;color:#0F6E56;font-weight:500;}
.fld{margin-bottom:12px;}
.fld label{display:block;font-size:11px;color:#666;margin-bottom:4px;font-weight:500;}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;font-size:13px;border:1px solid #DDD;border-radius:8px;background:#fff;color:#1A1A1A;transition:border .15s;}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:#0F6E56;}
.fld textarea{resize:vertical;min-height:64px;}
.btnp{width:100%;background:#0F6E56;color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
.btnp:hover{background:#085041;}
.divr{border:none;border-top:1px solid #EEE;margin:14px 0;}
/* ── Layout ── */
.layout{display:flex;min-height:calc(100vh - 80px);}
.sidebar{width:190px;background:#fff;border-right:1px solid #E8E8E8;padding:12px 0;flex-shrink:0;}
.nav-sec{padding:10px 16px 5px;font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.07em;}
.ni{padding:9px 16px;font-size:13px;cursor:pointer;color:#555;display:flex;align-items:center;gap:9px;border-left:3px solid transparent;transition:all .1s;}
.ni:hover{background:#F5F5F5;color:#222;}
.ni.on{background:#E8F5F0;color:#0F6E56;border-left-color:#0F6E56;font-weight:600;}
.sidebar-user{padding:12px 16px;font-size:11px;color:#888;border-top:1px solid #EEE;margin-top:8px;}
.sidebar-user strong{display:block;font-size:13px;color:#333;font-weight:600;}
.content{flex:1;padding:20px;overflow-y:auto;background:#F4F6F8;}
/* ── Cards & UI ── */
.ptitle{font-size:17px;font-weight:600;color:#1A1A1A;margin-bottom:3px;}
.psub{font-size:12px;color:#888;margin-bottom:16px;}
.card{background:#fff;border:1px solid #E8E8E8;border-radius:12px;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.sc{background:#F8F8F8;border-radius:10px;padding:12px 14px;border:1px solid #EEE;}
.sc-label{font-size:11px;color:#888;margin-bottom:4px;}
.sc-val{font-size:24px;font-weight:700;color:#1A1A1A;}
.sc-val.g{color:#0F6E56;}.sc-val.a{color:#854F0B;}.sc-val.r{color:#A32D2D;}.sc-val.b{color:#185FA5;}
.tbwrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#F5F5F5;padding:9px 11px;text-align:left;font-weight:600;font-size:11px;color:#666;border-bottom:1px solid #E8E8E8;white-space:nowrap;}
td{padding:9px 11px;border-bottom:1px solid #F0F0F0;color:#1A1A1A;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFAFA;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.bh{background:#E1F5EE;color:#085041;}.bk{background:#FAECE7;color:#993C1D;}
.bpd{background:#E6F1FB;color:#185FA5;}.bap{background:#EAF3DE;color:#3B6D11;}
.brj{background:#FCEBEB;color:#A32D2D;}.bconf{background:#E1F5EE;color:#0F6E56;}
.bi{background:#FAEEDA;color:#854F0B;}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;border-left:4px solid;}
.ai{background:#E6F1FB;color:#185FA5;border-color:#185FA5;}
.as{background:#E1F5EE;color:#085041;border-color:#0F6E56;}
.aw{background:#FAEEDA;color:#854F0B;border-color:#EF9F27;}
.perbadge{background:#E1F5EE;color:#085041;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;display:inline-block;margin-bottom:12px;}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px;border:1px solid #DDD;background:#fff;color:#333;cursor:pointer;}
.btn-sm:hover{background:#F5F5F5;}
.btna{background:#0F6E56;color:#fff;border:none;padding:6px 14px;font-size:12px;border-radius:7px;cursor:pointer;font-weight:500;}
.btna:hover{background:#085041;}
.btnr{background:#A32D2D;color:#fff;border:none;padding:6px 14px;font-size:12px;border-radius:7px;cursor:pointer;}
.btnex{background:#185FA5;color:#fff;border:none;padding:7px 16px;font-size:13px;border-radius:7px;cursor:pointer;font-weight:500;}
.frow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}

.empty-row td{background:#FFF8F6;}

<script>
// ── State ──
let API_URL = 'https://script.google.com/macros/s/AKfycbzcDN4iiLjBBK6Dy6s_8eFV6iCy5g_DLBDGi-mx0Jk_DHfB-lfUMUmcMYDlFAi-I9Y/exec'; // hardcoded — tidak perlu input dari user
let CU = null; // current user
let CACHE = { users:[], periods:[], absensi:[], holidays:[], phl:[], settings:[] };

// ── Init ──
window.onload = function() {
  // URL sudah di-hardcode, tidak perlu input dari user
  API_URL = 'https://script.google.com/macros/s/AKfycbzcDN4iiLjBBK6Dy6s_8eFV6iCy5g_DLBDGi-mx0Jk_DHfB-lfUMUmcMYDlFAi-I9Y/exec';
  localStorage.setItem('siabsen_api', API_URL);
  document.getElementById('api-url-input').value = API_URL;
  // Sembunyikan field URL — tidak diperlukan
  const field = document.getElementById('api-url-field');
  if (field) field.style.display = 'none';
  document.getElementById('lview').style.display = 'block';
};

function saveApiUrlFromLogin() {
  const input = document.getElementById('api-url-login');
  const v = (input ? input.value : '').trim();
  if (!v) {
    alert('URL tidak boleh kosong!'); return;
  }
  if (!v.includes('script.google.com')) {
    alert('URL tidak valid. Harus berisi script.google.com'); return;
  }
  API_URL = v;
  localStorage.setItem('siabsen_api', v);
  document.getElementById('api-url-input').value = v;
  // Sembunyikan field URL setelah tersimpan
  const field = document.getElementById('api-url-field');
  if (field) field.style.display = 'none';
  alert('URL berhasil disimpan! Silakan login.');
}

function resetApiUrl() {
  localStorage.removeItem('siabsen_api');
  API_URL = '';
  location.reload();
}

// ── API Helper ──
async function api(action, body={}) {
  showLoading(true);
  try {
    const url = API_URL + '?action=' + action;
    const res = await fetch(url, {
      method: 'POST',
      body: JSON.stringify({ action, ...body }),
      headers: { 'Content-Type': 'text/plain' }
    });
    const data = await res.json();
    return data;
  } catch(e) {
    return { ok: false, msg: 'Gagal terhubung ke server: ' + e.message };
  } finally {
    showLoading(false);
  }
}

function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'flex' : 'none';
}

// ── Login ──
async function doLogin() {
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value.trim();
  if (!u || !p) { showErr('Username dan password wajib diisi.'); return; }
  document.getElementById('btn-login').innerHTML = '<span class="spinner"></span> Masuk...';
  const res = await api('login', { username: u, password: p });
  document.getElementById('btn-login').textContent = 'Masuk';
  if (!res.ok) { showErr(res.msg || 'Login gagal.'); return; }
  // Cek status lock aplikasi
  if (res.user.role !== 'hr_staff') {
    const lockStatus = localStorage.getItem('vera_app_locked');
    if (lockStatus === '1') {
      showErr('Saat ini sistem sedang dalam periode payroll. Silahkan kontak Administrator HR.');
      return;
    }
  }
  CU = res.user;
  // preload data
  const [ur, pr, ar, hr, phlr, setr] = await Promise.all([
    api('getUsers'),
    api('getPeriods'),
    api('getAbsensi'),
    api('getHolidays'),
    api('getPHL'),
    api('getSettings')
  ]);
  CACHE.users    = ur.users      || [];
  CACHE.periods  = pr.periods    || [];
  CACHE.absensi  = ar.absensi    || [];
  CACHE.holidays = hr.holidays   || [];
  CACHE.phl      = phlr.phl     || [];
  CACHE.settings = setr.settings || [];

  document.getElementById('lview').style.display = 'none';
  document.getElementById('mview').style.display = 'block';
  document.getElementById('hdr').style.display   = 'flex';
  document.getElementById('hdr-user').textContent = CU.name + ' · ' + rlabel(CU.role);
  buildSidebar();
  document.querySelector('.ni')?.click();
}

function showErr(msg) {
  const el = document.getElementById('lerr');
  el.style.display = 'block'; el.textContent = msg;
}

function logout() {
  CU = null; CACHE = { users:[], periods:[], absensi:[] };
  document.getElementById('lview').style.display  = 'block';
  document.getElementById('mview').style.display  = 'none';
  document.getElementById('hdr').style.display    = 'none';
  document.getElementById('lerr').style.display   = 'none';
  document.getElementById('lu').value = '';
  document.getElementById('lp').value = '';
}

function rlabel(r) { return {hr_staff:'HR Staff',karyawan:'Karyawan',atasan:'Atasan',hr_manager:'HR Manager'}[r]||r; }

function buildSidebar() {
  const menus = {

    karyawan   : [{id:'konfirmasi',label:'Konfirmasi Absensi',ic:'✓'},{id:'riwayat', label:'Riwayat', ic:'☰'},{id:'ganti_password',label:'Ganti Password',ic:'🔒'}],
    atasan     : [{id:'absensi_saya', label:'Absensi Saya', ic:'✓'}, {id:'riwayat_saya', label:'Riwayat Saya', ic:'☰'}, {id:'approval', label:'Approval Tim', ic:'👍'}, {id:'tim', label:'Data Tim', ic:'≡'},{id:'ganti_password',label:'Ganti Password',ic:'🔒'}],

}

function nav(page) {
  document.querySelectorAll('.ni').forEach(n => n.classList.toggle('on', n.dataset.page === page));
  const R = { upload:pgUpload, monitor:pgMonitor, konfirmasi:pgKonfirmasi, riwayat:pgRiwayat, approval:pgApproval, tim:pgTim, rekap:pgRekap, absensi_saya:pgAbsensiSaya, riwayat_saya:pgRiwayatSaya, ganti_password:pgGantiPassword, lock_app:pgLockApp, holidays:pgHolidays, payroll:pgPayroll, phl_admin:pgPHLAdmin, settings_admin:pgSettingsAdmin };
  if (R[page]) R[page]();
}

// ── Helpers ──
function ftgl(d) {
  if (!d) return '—';
  const [y,m,dd] = d.split('-');
  const bln = ['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
  const hari = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const dayName = hari[new Date(parseInt(y), parseInt(m)-1, parseInt(dd)).getDay()];
  return `${dayName}, ${parseInt(dd)} ${bln[parseInt(m)]} ${y}`;
}

function getDayOfWeek(d) {
  if (!d) return -1;
  const [y,m,dd] = d.split('-');
  return new Date(parseInt(y), parseInt(m)-1, parseInt(dd)).getDay(); // 0=Min,6=Sab
}

function isWeekend(d) {
  const day = getDayOfWeek(d);
  return day === 0 || day === 6;
}

function isHoliday(d) {
  return (CACHE.holidays||[]).some(h => h.tanggal === d && h.aktif === 'ya');
}

function isNonWorkday(d) {
  return isWeekend(d) || isHoliday(d);
}

// ── Helper: tanggal hari ini dalam zona WITA (UTC+8) ──
// Digunakan agar semua pengecekan tanggal konsisten ke WITA
// terlepas dari timezone browser pengguna
function todayWITA() {
  const now  = new Date();
  // Offset WITA = UTC+8 = 480 menit
  const wita = new Date(now.getTime() + (480 - (-now.getTimezoneOffset())) * 60000);
  // Kembalikan sebagai string yyyy-MM-dd
  return wita.toISOString().split('T')[0];
}

function getSettingValueClient(settingId, defaultValue) {
  const today = todayWITA(); // dikunci ke WITA
  const rows = (CACHE.settings||[]).filter(s => String(s.id) === String(settingId));
  for (const s of rows) {
    if (s.aktif) return s.value;
  }
  return defaultValue;
}

// Cek apakah semua absensi sudah dikonfirmasi → kirim email ke atasan
async function checkAndNotify(userId, periodId) {
  try {
    const res = await api('checkAndSendEmail', { user_id: userId, period_id: periodId });
    if (res.ok && res.sent) {
      toast('✅ Semua absensi dikonfirmasi! Email notifikasi dikirim ke ' + res.atasan + '.', 's');
    }
    // Jika belum semua atau sudah pernah kirim — tidak perlu toast tambahan
  } catch(e) {
    // Silent fail — tidak ganggu user jika email gagal
    console.warn('checkAndNotify error:', e);
  }
}

function hitungDurasi(jmA, jkA) {
  if (!jmA || !jkA || jmA === '—' || jkA === '—') return '—';
  const [h1,m1] = jmA.split(':').map(Number);
  const [h2,m2] = jkA.split(':').map(Number);
  if (isNaN(h1)||isNaN(m1)||isNaN(h2)||isNaN(m2)) return '—';
  let totalMenit = (h2*60+m2) - (h1*60+m1);
  if (totalMenit < 0) totalMenit += 24*60;
  const jam = Math.floor(totalMenit/60);
  const menit = totalMenit % 60;
  return jam > 0 ? jam+'j '+(menit>0?menit+'m':'') : menit+'m';
}

function getPHLDurasi() {
  return parseInt(getSettingValueClient(10001, 90));
}

// Jam minimum kerja agar bisa claim PHL (dari Settings id=10002, default 0 = tidak ada minimum)
function getPHLMinJam() {
  return parseFloat(getSettingValueClient(10002, 0));
}

// Hitung durasi dalam JAM dari jam masuk & keluar (aktual diprioritaskan)
function hitungDurasiJam(a) {
  const jmA = a.jam_masuk_aktual  || a.jam_masuk  || '';
  const jkA = a.jam_keluar_aktual || a.jam_keluar || '';
  if (!jmA || !jkA) return 0;
  const [h1,m1] = jmA.split(':').map(Number);
  const [h2,m2] = jkA.split(':').map(Number);
  if (isNaN(h1)||isNaN(m1)||isNaN(h2)||isNaN(m2)) return 0;
  let totalMenit = (h2*60+m2) - (h1*60+m1);
  if (totalMenit < 0) totalMenit += 24*60;
  return totalMenit / 60;
}

// Cek apakah durasi kerja memenuhi syarat minimum PHL
function isPHLDurasiCukup(a) {
  const minJam = getPHLMinJam();
  if (minJam <= 0) return true; // tidak ada minimum
  return hitungDurasiJam(a) >= minJam;
}

function getPHLByAbsensiId(absensiId) {
  return (CACHE.phl||[]).find(p => p.absensi_id === absensiId) || null;
}
// PHL yang diajukan ke atasan tertentu (untuk tabel approval atasan)
function getPHLForAtasan(absensiId, atasanId) {
  return (CACHE.phl||[]).find(p => p.absensi_id === absensiId && p.atasan_phl_id === atasanId) || null;
}

function userHasPHL(userId, absensiId) {
  return (CACHE.phl||[]).some(p => p.user_id === userId && p.absensi_id === absensiId);
}
function getPeriodLabel(pid) {
  const p = CACHE.periods.find(x=>x.id===pid);
  if (!p) return '—';
  // Jika label adalah Date object atau string tanggal panjang, kembalikan id sebagai fallback
  const lbl = String(p.label||'').trim();
  if (!lbl || lbl.includes('GMT') || lbl.includes('00:00:00')) return pid;
  return lbl;
}
function getUserName(uid)    { const u = CACHE.users.find(x=>x.id===uid);   return u?u.name:'—'; }
function getBawahanIds() {
  // Karyawan dengan atasan_id ATAU atasan_id2 === CU.id
  return CACHE.users
    .filter(u => u.atasan_id === CU.id || u.atasan_id2 === CU.id)
    .map(u => u.id);
}

// Ambil daftar atasan yang bisa dipilih karyawan saat ajukan PHL
function getAtasanOptions(userId) {
  const u = CACHE.users.find(x => x.id === userId);
  if (!u) return [];
  const opts = [];
  if (u.atasan_id) {
    const a = CACHE.users.find(x => x.id === u.atasan_id);
    if (a) opts.push({ id: a.id, name: a.name, dept: a.dept });
  }
  if (u.atasan_id2) {
    const a = CACHE.users.find(x => x.id === u.atasan_id2);
    if (a) opts.push({ id: a.id, name: a.name, dept: a.dept });
  }
  return opts;
}

function toast(msg, t='s') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  const cfg = { s:{bg:'#E1F5EE',c:'#085041',bd:'#0F6E56'}, w:{bg:'#FAEEDA',c:'#854F0B',bd:'#EF9F27'}, e:{bg:'#FCEBEB',c:'#A32D2D',bd:'#E24B4A'} }[t]||{bg:'#eee',c:'#333',bd:'#999'};
  Object.assign(el.style, { background:cfg.bg, color:cfg.c, border:`1px solid ${cfg.bd}`, display:'block' });
  setTimeout(() => el.style.display='none', 3000);
}

async function refreshAbsensi() {

}

  document.getElementById('content').innerHTML = `

function getPayrollData(pid) {
  const karyawans = CACHE.users.filter(u => u.role === 'karyawan' || u.role === 'atasan');
  const periodLabel = getPeriodLabel(pid);
  return karyawans.map(u => {
    const abAll = CACHE.absensi.filter(a =>
      a.user_id === u.id &&
      a.period_id === pid &&
      a.status_konfirmasi === 'sudah' &&
      a.approval === 'approved'
    );
    // Hari kerja = bukan weekend dan bukan hari libur
    const hariKerja  = abAll.filter(a => !isNonWorkday(a.tanggal)).length;
    // Hari libur = weekend atau hari libur nasional
    const hariLibur  = abAll.filter(a => isNonWorkday(a.tanggal)).length;
    const total      = hariKerja + hariLibur;
    // Status kelengkapan
    const allAbsen = CACHE.absensi.filter(a => a.user_id === u.id && a.period_id === pid);
    const pending  = allAbsen.filter(a => a.approval === 'pending' || a.status_konfirmasi === 'belum').length;
    return { u, periodLabel, hariKerja, hariLibur, total, pending, allAbsen };
  }).sort((a,b) => a.u.name.localeCompare(b.u.name));
}

function renderPayrollTable() {
  const sel = document.getElementById('payroll-period-select');
  const pid = sel ? sel.value : '';
  const data = getPayrollData(pid);
  const tbody = document.getElementById('payroll-tbody');
  if (!tbody) return;
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#aaa;padding:20px;">Tidak ada data karyawan</td></tr>';
    return;
  }
  tbody.innerHTML = data.map((row, i) => {
    const { u, periodLabel, hariKerja, hariLibur, total, pending, allAbsen } = row;
    const statusBadge = pending > 0
      ? `<span class="badge bi">${pending} belum selesai</span>`
      : total === 0
        ? `<span class="badge bpd">Tidak ada data</span>`
        : `<span class="badge bap">Lengkap</span>`;
    return `<tr>
      <td style="color:#888;font-size:12px;">${i+1}</td>
      <td style="font-size:12px;color:#666;">${u.username}</td>
      <td style="font-weight:600;">${u.name}</td>
      <td><span class="badge bpd" style="font-size:10px;">${periodLabel}</span></td>
      <td style="text-align:center;font-weight:600;color:#0F6E56;">${hariKerja}</td>
      <td style="text-align:center;font-weight:600;color:#185FA5;">${hariLibur}</td>
      <td style="text-align:center;font-weight:700;font-size:15px;">${total}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');
}

function downloadPayrollExcel() {
  const sel = document.getElementById('payroll-period-select');
  const pid = sel ? sel.value : '';
  const periodLabel = getPeriodLabel(pid);
  const data = getPayrollData(pid);
  if (!data.length) { toast('Tidak ada data untuk didownload!','w'); return; }

  // Buat CSV dengan separator tab (bisa dibuka langsung di Excel)
  const hdr = ['No','Username','Nama','Periode','Hari Kerja (Approved)','Kerja di Hari Libur (Approved)','Total Hari','Status'];
  const rows = data.map((row, i) => {
    const { u, periodLabel, hariKerja, hariLibur, total, pending } = row;
    const status = pending > 0 ? 'Belum Selesai' : total === 0 ? 'Tidak Ada Data' : 'Lengkap';
    return [i+1, u.username, u.name, periodLabel, hariKerja, hariLibur, total, status].join('	');
  });

  const tsv = '\uFEFF' + [hdr.join('\t'), ...rows].join('\r\n'); // BOM untuk Excel
  const blob = new Blob([tsv], { type: 'application/vnd.ms-excel;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'payroll_' + periodLabel.replace(/\s+/g,'_') + '.xls';
  a.click();
  URL.revokeObjectURL(url);
  toast('File Excel berhasil didownload!','s');
}

async function doSubmitPHL(absensiId, tglStart, tglEnd) {
  const a = CACHE.absensi.find(x=>x.id===absensiId);
  if (!a) return;

  // Ambil atasan yang dipilih
  const selected = document.querySelector('input[name="phl-atasan"]:checked');
  if (!selected) { toast('Pilih atasan terlebih dahulu!', 'w'); return; }
  const atasanPhlId = selected.value;

  // Tutup modal
  const modal = document.getElementById('phl-modal');
  if (modal) modal.remove();

  const res = await api('addPHL', {
    user_id       : a.user_id,
    absensi_id    : a.id,
    tgl_masuk     : a.tanggal,
    period_id     : a.period_id,
    keterangan    : 'Masuk kerja di hari libur',
    atasan_phl_id : atasanPhlId,
  });

  if (res.ok) {
    const phlr = await api('getPHL');
    CACHE.phl = phlr.phl || [];
    const atasanName = CACHE.users.find(x=>x.id===atasanPhlId)?.name || '—';
    toast('PHL berhasil diajukan ke ' + atasanName + '. Menunggu persetujuan.', 's');
    if (document.getElementById('kbody'))        renderKonfirmasiByPeriod();
    if (document.getElementById('kbody-atasan')) renderAbsensiSayaByPeriod();
  } else {
    toast(res.msg, 'e');
  }
}

let uploadedRows = [];
function handleFile(input) {
  const f = input.files[0];
  if (!f) return;
  document.getElementById('up-filename').textContent = '📄 ' + f.name;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const lines = text.trim().split('\n');
    const hdr = lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
    uploadedRows = lines.slice(1).map(line => {
      const vals = line.split(',').map(v=>v.trim().replace(/"/g,''));
      const obj = {};
      hdr.forEach((h,i) => obj[h] = vals[i]||'');
      return obj;
    });
  };
  reader.readAsText(f);
}

async function doUpload() {

  if (!label) { toast('Isi nama periode terlebih dahulu!','w'); return; }

  // Buat period_id unik yang sama untuk semua baris
  const period_id = 'p_' + Date.now();

  const rows = uploadedRows.map((r,i) => ({
    ...r,
    id        : 'a_' + Date.now() + '_' + i,
    period_id : period_id,
  }));

  const res = await api('uploadAbsensi', {
    rows,
    period_label : label,
    period_start : start,
    period_end   : end,
    uploaded_by  : CU.id,
  });

  if (res.ok) {

async function doGantiPassword() {
  const oldPw  = document.getElementById('pw-old')?.value || '';
  const newPw  = document.getElementById('pw-new')?.value || '';
  const confPw = document.getElementById('pw-confirm')?.value || '';
  const msgEl  = document.getElementById('pw-msg');
  const btn    = document.getElementById('btn-ganti-pw');

  function showMsg(msg, type) {
    msgEl.style.display = 'block';
    msgEl.textContent   = msg;
    msgEl.style.background = type === 's' ? '#E1F5EE' : '#FCEBEB';
    msgEl.style.color      = type === 's' ? '#085041'  : '#A32D2D';
    msgEl.style.border     = '1px solid ' + (type === 's' ? '#0F6E56' : '#E24B4A');
  }

  // Validasi lokal
  if (!oldPw)  { showMsg('Password lama wajib diisi.', 'e'); return; }
  if (!newPw)  { showMsg('Password baru wajib diisi.', 'e'); return; }
  if (newPw.length < 6) { showMsg('Password baru minimal 6 karakter.', 'e'); return; }
  if (newPw !== confPw) { showMsg('Konfirmasi password tidak cocok.', 'e'); return; }
  if (oldPw === newPw)  { showMsg('Password baru tidak boleh sama dengan password lama.', 'e'); return; }

  btn.textContent = 'Menyimpan...';
  btn.disabled = true;

  // Verifikasi password lama via API login
  const verif = await api('login', { username: CU.username, password: oldPw });
  if (!verif.ok) {
    showMsg('Password lama salah. Silakan coba lagi.', 'e');
    btn.textContent = 'Simpan Password Baru';
    btn.disabled = false;
    return;
  }

  // Update password via API
  const res = await api('changePassword', { user_id: CU.id, new_password: newPw });
  btn.textContent = 'Simpan Password Baru';
  btn.disabled = false;

  if (res.ok) {
    showMsg('Password berhasil diubah! Silakan login ulang dengan password baru.', 's');
    document.getElementById('pw-old').value     = '';
    document.getElementById('pw-new').value     = '';
    document.getElementById('pw-confirm').value = '';
  } else {
    showMsg('Gagal mengubah password: ' + res.msg, 'e');
  }
}

function downloadDetailCSV(userId) {
  const u   = CACHE.users.find(x=>x.id===userId);
  const pid = window._monitorActivePID || '';
  const sel = document.getElementById('monitor-period-select');
  const periodLabel = sel ? sel.options[sel.selectedIndex]?.text : getPeriodLabel(pid);
  const ab  = CACHE.absensi.filter(a=>a.user_id===userId && a.period_id===pid);
  const hdr = ['Tanggal','Jam Masuk','Jam Keluar','Status Hadir','Jam Masuk Aktual','Jam Keluar Aktual','Alasan','Konfirmasi','Approval','Disetujui Oleh'];
  const rows = ab.map(a => {
    const approvedBy = CACHE.users.find(x=>x.id===a.approved_by);
    return [a.tanggal,a.jam_masuk,a.jam_keluar,a.status_hadir,a.jam_masuk_aktual,a.jam_keluar_aktual,
      '"'+(a.alasan_kosong||'')+'"',a.status_konfirmasi,a.approval,approvedBy?.name||''].join(',');
  });
  const csv = [hdr.join(','), ...rows].join('\n');
  const el = document.createElement('a');
  el.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  el.download = 'absensi_'+( u?.name||userId).replace(/\s+/g,'_')+'_'+periodLabel.replace(/\s+/g,'_')+'.csv';
  el.click();
  toast('CSV '+( u?.name||'') +' berhasil diunduh!','s');
}

function renderKonfirmasiByPeriod() {
  const sel    = document.getElementById('konfirmasi-period-select');
  const pid    = sel ? sel.value : '';
  const myAb   = CACHE.absensi.filter(a=>a.user_id===CU.id && a.period_id===pid);
  const belum  = myAb.filter(a=>a.status_konfirmasi==='belum').length;
  const kosong = myAb.filter(a=>a.status_hadir==='kosong').length;
  // Update stats
  const el = (id) => document.getElementById(id);
  if(el('k-total'))  el('k-total').textContent  = myAb.length;
  if(el('k-hadir'))  el('k-hadir').textContent  = myAb.filter(a=>a.status_hadir==='hadir').length;
  if(el('k-kosong')) el('k-kosong').textContent = kosong;
  if(el('k-belum'))  el('k-belum').textContent  = belum;
  // Update alert
  const alertEl = el('konfirmasi-alert');
  if (alertEl) {
    if (myAb.length === 0) {
      alertEl.innerHTML = '<div class="alert ai">Tidak ada data absensi untuk periode ini.</div>';
    } else if (belum > 0) {
      alertEl.innerHTML = '<div class="alert aw"><strong>'+belum+' data</strong> belum dikonfirmasi.'+(kosong>0?' <strong>'+kosong+' data kosong</strong> perlu alasan & jam aktual.':'')+'</div>';
    } else {
      alertEl.innerHTML = '<div class="alert as">Semua absensi sudah dikonfirmasi.</div>';
    }
  }
  // Update tabel - sort by tanggal ascending
  const sortedAb = [...myAb].sort((a,b)=>(a.tanggal||'').localeCompare(b.tanggal||''));
  const tbody = el('kbody');
  if (tbody) tbody.innerHTML = sortedAb.map(a=>rowK(a)).join('');
  // Reset checkbox
  const chkAll = el('chk-all-k');
  if (chkAll) chkAll.checked = false;
  updateSelCountK();
}

function rowK(a) {
  const isEmpty    = a.status_hadir === 'kosong';

  const hasJam     = (a.jam_masuk && a.jam_masuk !== '') || (a.jam_keluar && a.jam_keluar !== '');
  const skipKonfirmasi = nonWorkday && !hasJam;
  const noMasuk  = !a.jam_masuk  || a.jam_masuk  === '';
  const noKeluar = !a.jam_keluar || a.jam_keluar === '';
  const holidayObj = (CACHE.holidays||[]).find(h=>h.tanggal===a.tanggal);
  const rowStyle = nonWorkday ? (isWeekend(a.tanggal) ? 'background:#F5F5F5;' : 'background:#FFF8E1;') : (isEmpty ? '' : '');
  const rowClass = (!nonWorkday && isEmpty) ? 'empty-row' : '';
  const dayInfo  = nonWorkday ? `<br><span style="font-size:10px;color:${isWeekend(a.tanggal)?'#888':'#854F0B'};font-weight:500;">${isWeekend(a.tanggal)?'Hari Libur':(holidayObj?.info||'Libur')}</span>` : '';
  return `<tr class="${rowClass}" id="kr-${a.id}" style="${rowStyle}">
    <td style="width:36px;">${skipKonfirmasi || sudah ? '' : `<input type="checkbox" class="kchk" data-id="${a.id}" onchange="updateSelCountK()">`}</td>
    <td style="white-space:nowrap;">${ftgl(a.tanggal)}${dayInfo}</td>
    <td><span class="badge ${isEmpty?'bk':'bh'}">${isEmpty?'Kosong':'Hadir'}</span></td>
    <td style="min-width:90px;">
      ${sudah?(a.jam_masuk_aktual||a.jam_masuk||'—'):(!skipKonfirmasi&&isEmpty&&noMasuk)?`<input type="time" id="jma-${a.id}" class="input-time" step="60" value="${a.jam_masuk_aktual}" oninput="updateAmPm('jma-${a.id}','ampm-jma-${a.id}')"><span id="ampm-jma-${a.id}" style="font-size:11px;font-weight:600;color:#0F6E56;margin-left:3px;min-width:20px;display:inline-block;"></span>`:a.jam_masuk||'<span style="color:#aaa;font-size:12px;">—</span>'}
    </td>
    <td style="min-width:90px;">
      ${sudah?(a.jam_keluar_aktual||a.jam_keluar||'—'):(!skipKonfirmasi&&isEmpty&&noKeluar)?`<input type="time" id="jka-${a.id}" class="input-time" step="60" value="${a.jam_keluar_aktual}" oninput="updateAmPm('jka-${a.id}','ampm-jka-${a.id}')"><span id="ampm-jka-${a.id}" style="font-size:11px;font-weight:600;color:#0F6E56;margin-left:3px;min-width:20px;display:inline-block;"></span>`:a.jam_keluar||'<span style="color:#aaa;font-size:12px;">—</span>'}
    </td>
    <td style="white-space:nowrap;font-size:12px;color:#185FA5;font-weight:500;">
      ${hitungDurasi(a.jam_masuk_aktual||a.jam_masuk, a.jam_keluar_aktual||a.jam_keluar)}
    </td>
    <td style="min-width:180px;">
      ${sudah?`<span style="font-size:12px;color:#666;">${a.alasan_kosong||'—'}</span>`:
        skipKonfirmasi && !hasJam ? '<span style="font-size:11px;color:#aaa;">—</span>' :
        (isEmpty||nonWorkday)?`<input type="text" class="reason-input" id="al-${a.id}" placeholder="${nonWorkday&&hasJam?'Opsional...':'Wajib diisi...'}" value="${a.alasan_kosong}">`:
        '<span style="font-size:12px;color:#aaa;">Hadir normal</span>'}
    </td>
    <td style="white-space:nowrap;">
      ${skipKonfirmasi ? '<span style="font-size:11px;color:#aaa;">—</span>' :
        sudah ? `<span class="badge bconf">✓ Sudah</span>` :
        `<button class="btna" style="font-size:11px;" onclick="konfirmasi1('${a.id}')">Konfirmasi</button>`}
    </td>
    <td style="white-space:nowrap;min-width:120px;">
      ${(() => {
        // Tampilkan PHL hanya untuk hari libur/weekend yg ada jam masuk+keluar & sudah approved
        if (!nonWorkday || !hasJam) return '<span style="font-size:11px;color:#aaa;">—</span>';
        const phlExist = userHasPHL(a.user_id, a.id);
        if (phlExist) {
          const p = getPHLByAbsensiId(a.id);
          const phlStatus = p ? (p.status || 'pending') : 'pending';
          const badgeClass = phlStatus === 'aktif' ? 'bap' : phlStatus === 'ditolak' ? 'brj' : 'bi';
          const badgeLabel = phlStatus === 'aktif' ? '✓ PHL Aktif' : phlStatus === 'ditolak' ? '✗ PHL Ditolak' : '⏳ PHL Menunggu';
          const titleInfo = p ? 'Berlaku: '+p.tgl_start+' s/d '+p.tgl_end : '';
          return `<span class="badge ${badgeClass}" style="font-size:10px;" title="${titleInfo}">${badgeLabel}</span>`
            + (phlStatus !== 'aktif' ? ` <button onclick="deletePHLRow('${a.id}')" style="margin-left:4px;background:none;border:none;color:#A32D2D;cursor:pointer;font-size:11px;" title="Batalkan PHL">✕</button>` : '');
        }
        // Cek durasi minimum dari Settings id=10002
        const minJam = getPHLMinJam();
        const durJam = hitungDurasiJam(a);
        const cukup  = isPHLDurasiCukup(a);
        if (!cukup) {
          return `<span style="font-size:11px;color:#aaa;" title="Durasi kerja ${durJam.toFixed(1)}j kurang dari minimal ${minJam}j untuk klaim PHL">
            <span style="color:#DDD;cursor:not-allowed;" title="Durasi minimal ${minJam} jam">+ Ajukan PHL</span>
            <br><span style="color:#A32D2D;font-size:10px;">Min. ${minJam}j (${durJam.toFixed(1)}j)</span>
          </span>`;
        }
        return `<button class="btn-sm" style="font-size:11px;" onclick="ajukanPHL('${a.id}')">+ Ajukan PHL</button>`;
      })()}
    </td>
  </tr>`;
}

function validateJamAktual(a, prefix, tglLabel) {
  // prefix = '' untuk karyawan, 'a-' untuk atasan
  const al  = document.getElementById('al-'  + prefix + a.id);
  const jma = document.getElementById('jma-' + prefix + a.id);
  const jka = document.getElementById('jka-' + prefix + a.id);
  const alVal  = al?.value?.trim()  || '';
  const jmaVal = jma?.value?.trim() || '';
  const jkaVal = jka?.value?.trim() || '';
  const noMasukSistem  = !a.jam_masuk  || a.jam_masuk  === '';
  const noKeluarSistem = !a.jam_keluar || a.jam_keluar === '';
  // Hanya perlu validasi jika status kosong
  if (a.status_hadir !== 'kosong') return null;
  // Alasan selalu wajib
  if (!alVal) return (tglLabel ? tglLabel + ': ' : '') + 'Alasan wajib diisi!';
  // Kedua jam aktual kosong → boleh (asal alasan diisi, sudah dicek di atas)
  const jmaEmpty = noMasukSistem  && !jmaVal;
  const jkaEmpty = noKeluarSistem && !jkaVal;
  if (jmaEmpty && jkaEmpty) return null; // keduanya kosong → OK jika alasan ada
  // Salah satu diisi, yang lain kosong → wajib lengkapi
  if (!jmaEmpty && jkaEmpty) return (tglLabel ? tglLabel + ': ' : '') + 'Jam Keluar Aktual wajib diisi!';
  if (jmaEmpty && !jkaEmpty) return (tglLabel ? tglLabel + ': ' : '') + 'Jam Masuk Aktual wajib diisi!';
  return null; // keduanya terisi → OK
}

async function konfirmasi1(id) {
  const a = CACHE.absensi.find(x=>x.id===id); if (!a) return;
  const body = { id };
  if (a.status_hadir === 'kosong') {
    const err = validateJamAktual(a, '', '');
    if (err) { toast(err,'w'); return; }
    body.alasan_kosong     = document.getElementById('al-'+id)?.value?.trim() || '';
    body.jam_masuk_aktual  = document.getElementById('jma-'+id)?.value || '';
    body.jam_keluar_aktual = document.getElementById('jka-'+id)?.value || '';
  }
  const res = await api('konfirmasi', body);
  if (res.ok) {
    Object.assign(a, { status_konfirmasi:'sudah', ...body });
    document.getElementById('kr-'+id).outerHTML = rowK(a);
    toast('Dikonfirmasi!','s');
    // Cek apakah semua sudah dikonfirmasi → kirim email
    const selPid = document.getElementById('konfirmasi-period-select')?.value || '';
    checkAndNotify(CU.id, selPid);
  } else toast(res.msg,'e');
}

function updateAmPm(inputId, spanId) {
  const inp = document.getElementById(inputId);
  const span = document.getElementById(spanId);
  if (!inp || !span) return;
  const val = inp.value;
  if (!val) { span.textContent = ''; return; }
  const hour = parseInt(val.split(':')[0]);
  span.textContent = hour < 12 ? 'AM' : 'PM';
  span.style.color = hour < 12 ? '#185FA5' : '#A32D2D';
}

function toggleSelectAllK(v) {
  document.querySelectorAll('.kchk').forEach(c=>c.checked=v);
  updateSelCountK();
}

function updateSelCountK() {
  const n = document.querySelectorAll('.kchk:checked').length;
  const t = document.querySelectorAll('.kchk').length;
  const bar = document.getElementById('bulk-bar-k');
  if (bar) bar.style.display = n > 0 ? 'flex' : 'none';
  const el = document.getElementById('sel-count-k');
  if (el) el.textContent = n + ' dari ' + t + ' data dipilih';
  // sync checkbox header
  const chkAll = document.getElementById('chk-all-k');
  if (chkAll) chkAll.checked = (n > 0 && n === t);
}

async function konfirmasiSemua() {
  const ids = [...document.querySelectorAll('.kchk:checked')].map(c=>c.dataset.id);
  if (!ids.length) { toast('Pilih minimal 1 data terlebih dahulu!','w'); return; }
  const selected = CACHE.absensi.filter(a=>ids.includes(a.id));
  // Validasi dulu semua yang dipilih
  for (const a of selected) {
    const err = validateJamAktual(a, '', 'Tgl '+ftgl(a.tanggal));
    if (err) { toast(err,'w'); return; }
  }
  // Proses konfirmasi
  for (const a of selected) {
    const body = { id: a.id };
    if (a.status_hadir==='kosong') {
      body.alasan_kosong     = document.getElementById('al-'+a.id)?.value?.trim() || '';
      body.jam_masuk_aktual  = document.getElementById('jma-'+a.id)?.value || '';
      body.jam_keluar_aktual = document.getElementById('jka-'+a.id)?.value || '';
    }
    await api('konfirmasi', body);
    Object.assign(a, { status_konfirmasi:'sudah', ...body });
  }
  renderKonfirmasiByPeriod();
  toast(ids.length + ' absensi berhasil dikonfirmasi!','s');
  // Cek apakah semua sudah dikonfirmasi → kirim email
  const selPidK = document.getElementById('konfirmasi-period-select')?.value || '';
  checkAndNotify(CU.id, selPidK);
}

function renderAbsensiSayaByPeriod() {
  const sel    = document.getElementById('absensi-saya-period-select');
  const pid    = sel ? sel.value : '';
  const myAb   = CACHE.absensi.filter(a=>a.user_id===CU.id && a.period_id===pid);
  const belum  = myAb.filter(a=>a.status_konfirmasi==='belum').length;
  const kosong = myAb.filter(a=>a.status_hadir==='kosong').length;
  // Update stats
  const el = (id) => document.getElementById(id);
  if(el('as-total'))  el('as-total').textContent  = myAb.length;
  if(el('as-hadir'))  el('as-hadir').textContent  = myAb.filter(a=>a.status_hadir==='hadir').length;
  if(el('as-kosong')) el('as-kosong').textContent = kosong;
  if(el('as-belum'))  el('as-belum').textContent  = belum;
  // Update alert
  const alertEl = el('absensi-saya-alert');
  if (alertEl) {
    if (myAb.length === 0) {
      alertEl.innerHTML = '<div class="alert ai">Belum ada data absensi untuk periode ini. Hubungi HR Staff jika data belum diupload.</div>';
    } else if (belum > 0) {
      alertEl.innerHTML = '<div class="alert aw"><strong>'+belum+' data</strong> belum dikonfirmasi.'+(kosong>0?' <strong>'+kosong+' data kosong</strong> perlu alasan & jam aktual.':'')+'</div>';
    } else {
      alertEl.innerHTML = '<div class="alert as">Semua absensi Anda sudah dikonfirmasi.</div>';
    }
  }
  // Update tabel - sort by tanggal ascending
  const sortedAbSaya = [...myAb].sort((a,b)=>(a.tanggal||'').localeCompare(b.tanggal||''));
  const tbody = el('kbody-atasan');
  if (tbody) tbody.innerHTML = sortedAbSaya.map(a=>rowKAtasan(a)).join('');
}

function rowKAtasan(a) {
  const isEmpty = a.status_hadir === 'kosong';
  const sudah   = a.status_konfirmasi === 'sudah';
  const noMasuk  = !a.jam_masuk  || a.jam_masuk  === '';
  const noKeluar = !a.jam_keluar || a.jam_keluar === '';
  return `<tr class="${isEmpty?'empty-row':''}" id="kra-${a.id}">
    <td style="white-space:nowrap;">${ftgl(a.tanggal)}</td>
    <td><span class="badge ${isEmpty?'bk':'bh'}">${isEmpty?'Kosong':'Hadir'}</span></td>
    <td style="min-width:90px;">
      ${sudah?(a.jam_masuk_aktual||a.jam_masuk||'—'):isEmpty&&noMasuk?`<input type="time" id="jma-a-${a.id}" class="input-time" step="60" value="${a.jam_masuk_aktual}" oninput="updateAmPm('jma-a-${a.id}','ampm-jma-a-${a.id}')"><span id="ampm-jma-a-${a.id}" style="font-size:11px;font-weight:600;color:#0F6E56;margin-left:3px;min-width:20px;display:inline-block;"></span>`:a.jam_masuk||'<span style="color:#aaa;font-size:12px;">—</span>'}
    </td>
    <td style="min-width:90px;">
      ${sudah?(a.jam_keluar_aktual||a.jam_keluar||'—'):isEmpty&&noKeluar?`<input type="time" id="jka-a-${a.id}" class="input-time" step="60" value="${a.jam_keluar_aktual}" oninput="updateAmPm('jka-a-${a.id}','ampm-jka-a-${a.id}')"><span id="ampm-jka-a-${a.id}" style="font-size:11px;font-weight:600;color:#0F6E56;margin-left:3px;min-width:20px;display:inline-block;"></span>`:a.jam_keluar||'<span style="color:#aaa;font-size:12px;">—</span>'}
    </td>
    <td style="white-space:nowrap;font-size:12px;color:#185FA5;font-weight:500;">
      ${hitungDurasi(a.jam_masuk_aktual||a.jam_masuk, a.jam_keluar_aktual||a.jam_keluar)}
    </td>
    <td style="min-width:180px;">
      ${sudah?`<span style="font-size:12px;color:#666;">${a.alasan_kosong||'—'}</span>`:
        isEmpty?`<input type="text" class="reason-input" id="al-a-${a.id}" placeholder="Wajib diisi..." value="${a.alasan_kosong}">`:
        '<span style="font-size:12px;color:#aaa;">Hadir normal</span>'}
    </td>
    <td style="white-space:nowrap;">
      ${sudah?`<span class="badge bconf">✓ Sudah</span>`:`<button class="btna" style="font-size:11px;" onclick="konfirmasi1Atasan('${a.id}')">Konfirmasi</button>`}
    </td>
    <td style="white-space:nowrap;min-width:120px;">
      ${(() => {
        if (!nonWorkday || !hasJam) return '<span style="font-size:11px;color:#aaa;">—</span>';
        const phlExist = userHasPHL(a.user_id, a.id);
        if (phlExist) {
          const p = getPHLByAbsensiId(a.id);
          const phlStatus = p ? (p.status || 'pending') : 'pending';
          const badgeClass = phlStatus === 'aktif' ? 'bap' : phlStatus === 'ditolak' ? 'brj' : 'bi';
          const badgeLabel = phlStatus === 'aktif' ? '✓ PHL Aktif' : phlStatus === 'ditolak' ? '✗ PHL Ditolak' : '⏳ PHL Menunggu';
          const titleInfo = p ? 'Berlaku: '+p.tgl_start+' s/d '+p.tgl_end : '';
          return `<span class="badge ${badgeClass}" style="font-size:10px;" title="${titleInfo}">${badgeLabel}</span>`
            + (phlStatus !== 'aktif' ? ` <button onclick="deletePHLRow('${a.id}')" style="margin-left:4px;background:none;border:none;color:#A32D2D;cursor:pointer;font-size:11px;" title="Batalkan PHL">✕</button>` : '');
        }
        // Cek durasi minimum dari Settings id=10002
        const minJamA = getPHLMinJam();
        const durJamA = hitungDurasiJam(a);
        const cukupA  = isPHLDurasiCukup(a);
        if (!cukupA) {
          return `<span style="font-size:11px;color:#aaa;" title="Durasi kerja ${durJamA.toFixed(1)}j kurang dari minimal ${minJamA}j untuk klaim PHL">
            <span style="color:#DDD;cursor:not-allowed;">+ Ajukan PHL</span>
            <br><span style="color:#A32D2D;font-size:10px;">Min. ${minJamA}j (${durJamA.toFixed(1)}j)</span>
          </span>`;
        }
        return `<button class="btn-sm" style="font-size:11px;" onclick="ajukanPHL('${a.id}')">+ Ajukan PHL</button>`;
      })()}
    </td>
  </tr>`;
}

async function konfirmasi1Atasan(id) {
  const a = CACHE.absensi.find(x=>x.id===id); if (!a) return;
  const body = { id };
  if (a.status_hadir === 'kosong') {
    const err = validateJamAktual(a, 'a-', '');
    if (err) { toast(err,'w'); return; }
    body.alasan_kosong     = document.getElementById('al-a-'+id)?.value?.trim() || '';
    body.jam_masuk_aktual  = document.getElementById('jma-a-'+id)?.value || '';
    body.jam_keluar_aktual = document.getElementById('jka-a-'+id)?.value || '';
  }
  const res = await api('konfirmasi', body);
  if (res.ok) {
    Object.assign(a, { status_konfirmasi:'sudah', ...body });
    document.getElementById('kra-'+id).outerHTML = rowKAtasan(a);
    toast('Dikonfirmasi!','s');
    // Cek apakah semua sudah dikonfirmasi → kirim email
    const selPidA = document.getElementById('absensi-saya-period-select')?.value || '';
    checkAndNotify(CU.id, selPidA);
  } else toast(res.msg,'e');
}

async function konfirmasiSemuaAtasan() {
  const selA = document.getElementById('absensi-saya-period-select');
  const activePID = selA ? selA.value : (CACHE.periods.find(p=>p.status==='open')?.id || '');
  const pending = CACHE.absensi.filter(a=>a.user_id===CU.id && a.period_id===activePID && a.status_konfirmasi==='belum');
  for (const a of pending) {
    const err = validateJamAktual(a, 'a-', 'Tgl '+ftgl(a.tanggal));
    if (err) { toast(err,'w'); return; }
  }
  for (const a of pending) {
    const body = { id: a.id };
    if (a.status_hadir==='kosong') {
      body.alasan_kosong     = document.getElementById('al-a-'+a.id)?.value?.trim() || '';
      body.jam_masuk_aktual  = document.getElementById('jma-a-'+a.id)?.value || '';
      body.jam_keluar_aktual = document.getElementById('jka-a-'+a.id)?.value || '';
    }
    await api('konfirmasi', body);
    Object.assign(a, { status_konfirmasi:'sudah', ...body });
  }
  renderAbsensiSayaByPeriod();
  toast('Semua absensi berhasil dikonfirmasi!','s');
  // Cek apakah semua sudah dikonfirmasi → kirim email
  const selA2 = document.getElementById('absensi-saya-period-select');
  const activePIDA = selA2 ? selA2.value : (CACHE.periods.find(p=>p.status==='open')?.id || '');
  checkAndNotify(CU.id, activePIDA);
}

            <td><span class="badge bpd" style="font-size:10px;">${pLabel}</span></td>
            <td style="white-space:nowrap;">${ftgl(a.tanggal)}</td>
            <td>${a.jam_masuk||'—'}</td><td>${a.jam_keluar||'—'}</td>
            <td style="color:#0F6E56;">${a.jam_masuk_aktual||'—'}</td>

function getFilteredAp() {
  const bawahan = getBawahanIds();
  const fM = document.getElementById('f-member')?.value || '';
  const fS = document.getElementById('f-status')?.value || '';
  const fH = document.getElementById('f-hadir')?.value  || '';
  const fP = document.getElementById('f-period')?.value || '';
  return CACHE.absensi.filter(a => {
    if (!bawahan.includes(a.user_id)) return false;
    if (a.status_konfirmasi !== 'sudah') return false;
    if (fM && a.user_id   !== fM) return false;
    if (fS && a.approval  !== fS) return false;
    if (fH && a.status_hadir !== fH) return false;
    if (fP && a.period_id !== fP) return false;
    return true;
  });
}

  document.getElementById('sel-count').textContent = `${n} dari ${t} data dipilih`;
}
function toggleSelectAll(v) { document.querySelectorAll('.apchk').forEach(c=>c.checked=v); updateSelCount(); }

async function singleApprove(id, status) {
  const res = await api('approval', { id, status, approved_by: CU.id });
  if (res.ok) {
    const a = CACHE.absensi.find(x=>x.id===id);
    if (a) a.approval = status;
    toast(status==='approved'?'Disetujui!':'Ditolak.', status==='approved'?'s':'w');
    renderApprovalTable();
  } else toast(res.msg,'e');
}

async function bulkApprove(status) {
  const ids = [...document.querySelectorAll('.apchk:checked')].map(c=>c.dataset.id);
  if (!ids.length) { toast('Pilih minimal 1 data!','w'); return; }
  const res = await api('bulkApproval', { ids, status, approved_by: CU.id });
  if (res.ok) {
    ids.forEach(id => { const a = CACHE.absensi.find(x=>x.id===id); if(a) a.approval=status; });
    toast(`${res.updated} data ${status==='approved'?'disetujui':'ditolak'}.`, status==='approved'?'s':'w');
    renderApprovalTable();
  } else toast(res.msg,'e');
}

// ════════════════════════════════════
//  HALAMAN: Data Tim (Atasan)
// ════════════════════════════════════
function pgTim() {
  const bawahan = getBawahanIds();
  const members = CACHE.users.filter(u=>bawahan.includes(u.id));
  const allAb   = CACHE.absensi.filter(a=>bawahan.includes(a.user_id));
  document.getElementById('content').innerHTML = `
  <div class="ptitle">Data Absensi Tim</div>
  <div class="psub">Rekap absensi semua anggota tim per periode</div>
  <div class="card">
    <div class="tbwrap"><table>
      <thead><tr><th>Nama</th><th>Departemen</th><th>Periode</th><th>Total Hari</th><th>Hadir</th><th>Kosong</th><th>Konfirmasi</th><th>Approval</th></tr></thead>
      <tbody>${members.flatMap(u => CACHE.periods.map(per => {
        const ab = allAb.filter(a=>a.user_id===u.id && a.period_id===per.id);
        if (!ab.length) return '';
        const h  = ab.filter(a=>a.status_hadir==='hadir').length;
        const k  = ab.filter(a=>a.status_hadir==='kosong').length;
        const sk = ab.filter(a=>a.status_konfirmasi==='sudah').length;
        const apA= ab.every(a=>a.approval==='approved');
        const apS= ab.some(a=>a.approval==='approved');
        return `<tr>
          <td style="font-weight:600;">${u.name}</td><td>${u.dept}</td>
          <td><span class="badge bpd" style="font-size:10px;">${per.label}</span></td>
          <td>${ab.length}</td>
          <td style="color:#0F6E56;font-weight:600;">${h}</td>
          <td style="color:${k>0?'#A32D2D':'#0F6E56'};font-weight:600;">${k}</td>
          <td><span class="badge ${sk===ab.length?'bconf':'bpd'}">${sk}/${ab.length}</span></td>
          <td><span class="badge ${apA?'bap':apS?'bi':'bpd'}">${apA?'Selesai':apS?'Sebagian':'Menunggu'}</span></td>
        </tr>`;
      })).join('')}</tbody>
    </table></div>
  </div>`;
}

// ════════════════════════════════════
//  HALAMAN: Rekap (HR Manager)
// ════════════════════════════════════
function pgRekap() {
  const activePID = CACHE.periods.find(p=>p.status==='open')?.id || '';
  const allAp = CACHE.absensi.filter(a=>a.period_id===activePID && a.approval==='approved');
  const allPd = CACHE.absensi.filter(a=>a.period_id===activePID && a.approval==='pending' && a.status_konfirmasi==='sudah');
  const total = CACHE.absensi.filter(a=>a.period_id===activePID).length;
  document.getElementById('content').innerHTML = `
  <div class="ptitle">Rekap & Ekspor Absensi</div>
  <div class="psub">Tarik dan ekspor data yang sudah disetujui atasan</div>
  <div class="stats">
    <div class="sc"><div class="sc-label">Total Data</div><div class="sc-val">${total}</div></div>
    <div class="sc"><div class="sc-label">Sudah Disetujui</div><div class="sc-val g">${allAp.length}</div></div>
    <div class="sc"><div class="sc-label">Menunggu Approval</div><div class="sc-val a">${allPd.length}</div></div>
    <div class="sc"><div class="sc-label">Siap Ekspor</div><div class="sc-val b">${allAp.length}</div></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:600;">Data Approved — ${CACHE.periods.find(p=>p.id===activePID)?.label||'—'}</div>
      <div style="display:flex;gap:8px;">
        <button class="btnex" onclick="exportCSV()">⬇ Ekspor CSV</button>
        <button class="btn-sm" onclick="refreshRekap()">🔄 Refresh</button>
      </div>
    </div>
    <div class="tbwrap"><table>
      <thead><tr><th>Nama</th><th>Departemen</th><th>Periode</th><th>Tanggal</th><th>Jam Masuk</th><th>Jam Keluar</th><th>Jam Masuk Aktual</th><th>Jam Keluar Aktual</th><th>Status</th><th>Alasan</th><th>Disetujui Oleh</th></tr></thead>
      <tbody>${allAp.map(a=>{
        const u  = CACHE.users.find(x=>x.id===a.user_id);
        const at = CACHE.users.find(x=>x.id===a.approved_by) || CACHE.users.find(x=>x.id===a.atasan_id);
        return`<tr>
          <td style="font-weight:600;">${u?u.name:'—'}</td><td>${u?u.dept:'—'}</td>
          <td><span class="badge bpd" style="font-size:10px;">${getPeriodLabel(a.period_id)}</span></td>
          <td style="white-space:nowrap;">${ftgl(a.tanggal)}</td>
          <td>${a.jam_masuk||'—'}</td><td>${a.jam_keluar||'—'}</td>
          <td style="color:#0F6E56;">${a.jam_masuk_aktual||'—'}</td>
          <td style="color:#0F6E56;">${a.jam_keluar_aktual||'—'}</td>
          <td><span class="badge ${a.status_hadir==='hadir'?'bh':'bk'}">${a.status_hadir==='hadir'?'Hadir':'Kosong'}</span></td>
          <td style="font-size:12px;">${a.alasan_kosong||'—'}</td>
          <td style="font-size:12px;">${at?at.name:'—'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
    ${allPd.length>0?`<div class="alert aw" style="margin-top:12px;"><strong>${allPd.length} data</strong> masih menunggu approval atasan.</div>`:''}
  </div>`;
}

async function refreshRekap() { await refreshAbsensi(); pgRekap(); toast('Data diperbarui','s'); }

function exportCSV() {
  const activePID = CACHE.periods.find(p=>p.status==='open')?.id || '';
  const allAp = CACHE.absensi.filter(a=>a.period_id===activePID && a.approval==='approved');
  const hdr = ['Nama','Departemen','Periode','Tanggal','Jam Masuk','Jam Keluar','Jam Masuk Aktual','Jam Keluar Aktual','Status Hadir','Alasan','Disetujui Oleh'];
  const rows = allAp.map(a => {
    const u  = CACHE.users.find(x=>x.id===a.user_id);
    const at = CACHE.users.find(x=>x.id===a.approved_by) || CACHE.users.find(x=>x.id===a.atasan_id);
    return [u?.name,u?.dept,getPeriodLabel(a.period_id),a.tanggal,a.jam_masuk,a.jam_keluar,a.jam_masuk_aktual,a.jam_keluar_aktual,a.status_hadir,a.alasan_kosong,at?.name].join(',');
  });
  const csv = [hdr.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'rekap_absensi_' + (CACHE.periods.find(p=>p.id===activePID)?.label||'export').replace(' ','_') + '.csv';
  a.click();
  toast('File CSV berhasil diunduh!','s');
}
